# Release Gate Workflow
# This workflow acts as a required status check to ensure Release-Please PRs
# are only mergeable after the Internal Promotion workflow has successfully
# deployed to production.
#
# For regular developer PRs (not release-please--*), this check auto-passes.
# For Release-Please PRs, it verifies the prod deployment has completed.

name: Release Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      force_full_workflow:
        description: 'Force full workflow execution (test the release gate logic)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: read
  actions: read
  deployments: read

jobs:
  verify-promotion:
    name: Verify Internal Promotion
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
      
      - name: Auto-pass for manual triggers
        if: github.event_name == 'workflow_dispatch' && !inputs.force_full_workflow
        run: |
          echo "✅ Manual workflow trigger - gate passed automatically"
          echo "This allows the workflow to be used in branch protection rules."
      
      - name: Get PR details
        if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.force_full_workflow)
        id: pr-info
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
          WORKFLOW_REF: ${{ github.ref_name }}
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # From pull_request event
            PR_NUMBER="$EVENT_PR_NUMBER"
            BRANCH_NAME="$EVENT_BRANCH_NAME"
          else
            # From workflow_dispatch - find PR for this branch
            BRANCH_NAME="$WORKFLOW_REF"
            echo "🔍 Finding PR for branch: $BRANCH_NAME"
            PR_DATA=$(gh pr list --head "$BRANCH_NAME" --state open --json number --limit 1)
            PR_NUMBER=$(echo "$PR_DATA" | jq -r '.[0].number // empty')
            
            if [[ -z "$PR_NUMBER" ]]; then
              echo "❌ No open PR found for branch $BRANCH_NAME"
              exit 1
            fi
          fi
          
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          echo "📋 PR Number: $PR_NUMBER"
          echo "🌿 Branch: $BRANCH_NAME"
      
      - name: Check if Release-Please PR
        if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.force_full_workflow)
        id: is-release-pr
        env:
          BRANCH_NAME: ${{ steps.pr-info.outputs.branch_name }}
        run: |
          BRANCH="$BRANCH_NAME"
          
          if [[ "$BRANCH" == release-please--* ]]; then
            echo "is_release_pr=true" >> "$GITHUB_OUTPUT"
            echo "🎯 This is a Release-Please PR - promotion verification required"
          else
            echo "is_release_pr=false" >> "$GITHUB_OUTPUT"
            echo "✅ This is a regular PR - auto-passing"
          fi
      
      - name: Auto-pass for non-release PRs
        if: steps.is-release-pr.outputs.is_release_pr == 'false'
        run: |
          echo "✅ Not a Release-Please PR - gate passed automatically"
          echo "This PR does not require internal promotion to be complete."
      
      - name: Verify Internal Promotion completion
        if: steps.is-release-pr.outputs.is_release_pr == 'true'
        uses: ./.github/actions/release-gate-check
        with:
          pr_number: ${{ steps.pr-info.outputs.pr_number }}
          branch_name: ${{ steps.pr-info.outputs.branch_name }}
          github_token: ${{ github.token }}
