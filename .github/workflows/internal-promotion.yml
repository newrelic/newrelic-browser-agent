  # Step 4: Deploy to US Production
  deploy-us-prod:
    needs: [resolve-version, deploy-eu-prod]
    runs-on: ubuntu-latest
    environment: nr1-us-prod
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
      
      # Build fresh assets for Release Candidate mode
      - name: Build and upload RC assets for us-prod
        if: needs.resolve-version.outputs.is_rc_mode == 'true'
        run: |
          echo "🔨 Building fresh assets from current branch for us-prod environment"
