name: Daily Dispatch

on:
  schedule:
    - cron: '0 15 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  actions: read

concurrency:
  group: daily-dispatch
  cancel-in-progress: true

jobs:
  notify:
    name: Notify Slack
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Build daily dispatch
        id: dispatch
        uses: ./.github/actions/daily-dispatch
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Slack notification
        uses: ./.github/actions/slack-notification
        with:
          browser_agent_dev_channel_url: ${{ secrets.SLACK_BROWSER_AGENT_DEV_WEBHOOK_URL }}
          payload: ${{ steps.dispatch.outputs.payload }}

      - name: Publish metrics to New Relic
        uses: ./.github/actions/newrelic-custom-event
        with:
          insert_key: ${{ secrets.INTERNAL_STAGING_INGEST_LICENSE_KEY }}
          account_id: ${{ secrets.INTERNAL_STAGING_INGEST_ACCOUNT_ID }}
          event_type: Br0ws3rMetrics
          attributes: ${{ steps.dispatch.outputs.metrics }}
