      - uses: actions/checkout@v4
      - name: Create US production change tracking event (Account 1067061)
        uses: ./.github/actions/change-tracking
        with:
          accountId: '1067061'
          entityGuid: ${{ secrets.NR_ENTITY_GUID_NR1_US_PROD }}
          apiKey: ${{ secrets.NR_CHANGE_TRACKING_API_KEY_NR1 }}
          region: 'US'
          version: ${{ needs.resolve-version.outputs.version_label }}
          type: 'Rolling'
          description: 'US production promoted to ${{ needs.resolve-version.outputs.version_label }}'
          shortDescription: 'US Prod: ${{ needs.resolve-version.outputs.version_label }}'
          deepLink: 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          commit: ${{ github.sha }}
