# This workflow is used to manually deploy a Browser Agent version
# to NR1 environments by updating the "released" asset that NR1 pages load.
# This workflow enforces a strict sequential promotion path:
# staging -> jp-prod -> eu-prod -> prod
# Each environment requires manual approval via GitHub Environment protection rules.
#
# Two deployment modes:
# 1. "release candidate" (default): Builds fresh from current branch state and
#    deploys to environment-specific paths (/staging/, /jp-prod/, /eu-prod/, /prod/)
# 2. Specific version/URL: Uses an existing versioned build for rollbacks or
#    re-promotions (e.g., "1.314.0" or full URL)

name: Internal Promotion

on:
  workflow_dispatch:
    inputs:
      cdn_path:
        description: 'Deployment source: "release candidate" (default - builds from current branch) OR specific version for rollback (e.g., "1.314.0")'
        required: false
        type: string
        default: 'release candidate'

permissions:
  contents: read
  id-token: write

jobs:
  # Determine deployment mode and resolve version for non-RC deployments
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      is_rc_mode: ${{ steps.determine-mode.outputs.is_rc_mode }}
      script_url: ${{ steps.resolve-cdn-path.outputs.script_url }}
      version_label: ${{ steps.resolve-cdn-path.outputs.version_label }}
    steps:
      - name: Determine deployment mode
        id: determine-mode
        run: |
          CDN_PATH="${{ inputs.cdn_path }}"
          
          if [[ "$CDN_PATH" == "release candidate" ]]; then
            echo "is_rc_mode=true" >> $GITHUB_OUTPUT
            echo "🚀 Release Candidate mode: Will build fresh from current branch for each environment"
          else
            echo "is_rc_mode=false" >> $GITHUB_OUTPUT
            echo "📦 Specific version mode: Will use provided version/URL"
          fi
      
      - name: Resolve CDN path for specific version mode
        if: steps.determine-mode.outputs.is_rc_mode == 'false'
        id: resolve-cdn-path
        run: |
          CDN_PATH="${{ inputs.cdn_path }}"
          
          if [[ "$CDN_PATH" =~ ^https?:// ]]; then
            # Full URL provided
            SCRIPT_URL="$CDN_PATH"
            VERSION_LABEL="$CDN_PATH"
          elif [[ "$CDN_PATH" =~ ^[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+ ]]; then
            # RC version number provided (e.g., "1.314.0-rc.1")
            SCRIPT_URL="https://js-agent.newrelic.com/nr-loader-spa-${CDN_PATH}.min.js"
            VERSION_LABEL="$CDN_PATH"
          elif [[ "$CDN_PATH" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            # Released version number provided (e.g., "1.314.0")
            SCRIPT_URL="https://js-agent.newrelic.com/nr-loader-spa-${CDN_PATH}.min.js"
            VERSION_LABEL="v${CDN_PATH}"
          else
            echo "❌ Invalid cdn_path format: $CDN_PATH"
            echo ""
            echo "Valid formats:"
            echo "  - 'release candidate' (default - builds from current branch)"
            echo "  - Released version: 1.314.0 (for rollbacks)"
            echo "  - RC version: 1.314.0-rc.1 (for re-promotion of specific RC)"
            echo "  - Full URL: https://js-agent.newrelic.com/nr-loader-spa-1.314.0.min.js"
            exit 1
          fi
          
          echo "script_url=$SCRIPT_URL" >> $GITHUB_OUTPUT
          echo "version_label=$VERSION_LABEL" >> $GITHUB_OUTPUT
          echo "✅ Resolved CDN path: $SCRIPT_URL"
          echo "📋 Version label: $VERSION_LABEL"

  # Step 1: Deploy to Staging
  deploy-staging:
    needs: [resolve-version]
    runs-on: ubuntu-latest
    environment: nr1-staging
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
      
      # Build fresh assets for Release Candidate mode
      - name: Build and upload RC assets for staging
        if: needs.resolve-version.outputs.is_rc_mode == 'true'
        id: build-rc
        run: |
          echo "🔨 Building fresh assets from current branch for staging environment"
          npm ci
          npm run cdn:webpack -- --env mode=staging
          
          echo "📤 Uploading to /staging/ path"
      
      - name: Upload RC assets to S3
        if: needs.resolve-version.outputs.is_rc_mode == 'true'
        id: s3-upload-rc
        uses: ./.github/actions/s3-upload
        with:
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_role: ${{ secrets.AWS_ROLE_ARN }}
          aws_bucket_name: ${{ secrets.AWS_BUCKET }}
          local_dir: $GITHUB_WORKSPACE/build
          bucket_dir: staging/
      
      - name: Purge staging CDN cache for RC assets
        if: needs.resolve-version.outputs.is_rc_mode == 'true'
        uses: ./.github/actions/fastly-purge
        with:
          fastly_key: ${{ secrets.FASTLY_PURGE_KEY }}
          fastly_service: staging-js-agent.newrelic.com
          purge_path: ${{ join(fromJson(steps.s3-upload-rc.outputs.results).*.Key, ' ') }}
      
      - name: Verify staging CDN assets
        if: needs.resolve-version.outputs.is_rc_mode == 'true'
        uses: ./.github/actions/fastly-verify
        with:
          fastly_key: ${{ secrets.FASTLY_PURGE_KEY }}
          fastly_service: staging-js-agent.newrelic.com
          asset_path: ${{ join(fromJson(steps.s3-upload-rc.outputs.results).*.Key, ' ') }}
      
      # Determine which script URL to use
      - name: Set script URL
        id: script-url
        run: |
          if [[ "${{ needs.resolve-version.outputs.is_rc_mode }}" == "true" ]]; then
            SCRIPT_URL="https://staging-js-agent.newrelic.com/staging/nr-loader-spa.min.js"
            VERSION_LABEL="staging-rc-$(date +%Y%m%d-%H%M%S)"
          else
            SCRIPT_URL="${{ needs.resolve-version.outputs.script_url }}"
            VERSION_LABEL="${{ needs.resolve-version.outputs.version_label }}"
          fi
          echo "script_url=$SCRIPT_URL" >> $GITHUB_OUTPUT
          echo "version_label=$VERSION_LABEL" >> $GITHUB_OUTPUT
          echo "Using script URL: $SCRIPT_URL"
      
      - name: Promote agent to Staging
        uses: ./.github/actions/internal-promotion
        with:
          nr_environment: staging
          nrba_released_script_url: ${{ steps.script-url.outputs.script_url }}
          nrba_app_id: ${{ secrets.INTERNAL_STAGING_APPLICATION_ID }}
          nrba_license_key: ${{ secrets.INTERNAL_LICENSE_KEY }}
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_role: ${{ secrets.AWS_ROLE_ARN }}
          aws_bucket_name: ${{ secrets.AWS_BUCKET }}
          fastly_key: ${{ secrets.FASTLY_PURGE_KEY }}
    
    outputs:
      version_label: ${{ steps.script-url.outputs.version_label }}

  # Create change tracking event for staging
  create-staging-change-tracking:
    needs: [deploy-staging]
    environment: change-tracking
    runs-on: Browser-Agent-Assigned-IP-Linux
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Create staging change tracking event (Account 1067061)
        uses: ./.github/actions/change-tracking
        with:
          accountId: '1067061'
          entityGuid: ${{ secrets.NR_ENTITY_GUID_NR1_STAGING }}
          apiKey: ${{ secrets.NR_CHANGE_TRACKING_API_KEY_NR1 }}
          region: 'Staging'
          version: ${{ needs.deploy-staging.outputs.version_label }}
          type: 'Basic'
          description: 'Staging promoted to ${{ needs.deploy-staging.outputs.version_label }}'
          shortDescription: 'Staging: ${{ needs.deploy-staging.outputs.version_label }}'
          deepLink: 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          commit: ${{ github.sha }}
          user: ${{ github.actor }}
          groupId: '${{ github.run_id }}-${{ github.sha }}'

  # Notify staging deployment
  notify-staging:
    needs: [deploy-staging]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Send Slack notification
        uses: ./.github/actions/slack-notification
        with:
          notifications_channel_url: ${{ secrets.SLACK_BROWSER_AGENT_NOTIFICATIONS_WEBHOOK_URL }}
          dem_platform_ops_channel_url: ${{ secrets.SLACK_DEM_PLATFORM_OPS_WEBHOOK_URL }}
          message: ":rocket: New Browser Agent version promoted to \\`staging\\` environment.  See <https://github.com/newrelic/newrelic-browser-agent/actions/runs/${{ github.run_id }}|workflow run>."

  # Step 2: Deploy to Japan Production
  deploy-jp-prod:
    needs: [resolve-version, deploy-staging]
    runs-on: ubuntu-latest
    environment: nr1-jp-prod
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
      
      # Build fresh assets for Release Candidate mode
      - name: Build and upload RC assets for jp-prod
        if: needs.resolve-version.outputs.is_rc_mode == 'true'
        run: |
          echo "🔨 Building fresh assets from current branch for jp-prod environment"
          npm ci
          npm run cdn:webpack -- --env mode=jp-prod
          echo "📤 Uploading to /jp-prod/ path"
      
      - name: Upload RC assets to S3
        if: needs.resolve-version.outputs.is_rc_mode == 'true'
        id: s3-upload-rc
        uses: ./.github/actions/s3-upload
        with:
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_role: ${{ secrets.AWS_ROLE_ARN }}
          aws_bucket_name: ${{ secrets.AWS_BUCKET }}
          local_dir: $GITHUB_WORKSPACE/build
          bucket_dir: jp-prod/
      
      - name: Purge production CDN cache for RC assets
        if: needs.resolve-version.outputs.is_rc_mode == 'true'
        uses: ./.github/actions/fastly-purge
        with:
          fastly_key: ${{ secrets.FASTLY_PURGE_KEY }}
          fastly_service: js-agent.newrelic.com
          purge_path: ${{ join(fromJson(steps.s3-upload-rc.outputs.results).*.Key, ' ') }}
      
      - name: Verify production CDN assets
        if: needs.resolve-version.outputs.is_rc_mode == 'true'
        uses: ./.github/actions/fastly-verify
        with:
          fastly_key: ${{ secrets.FASTLY_PURGE_KEY }}
          fastly_service: js-agent.newrelic.com
          asset_path: ${{ join(fromJson(steps.s3-upload-rc.outputs.results).*.Key, ' ') }}
      
      # Determine which script URL to use
