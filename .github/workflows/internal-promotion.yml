# This workflow is used to manually deploy a specific Browser Agent version
# to NR1 environments by updating the "released" asset that NR1 pages load.
# This workflow enforces a strict sequential promotion path:
# staging -> jp-prod -> eu-prod -> prod
# Each environment requires manual approval via GitHub Environment protection rules.
#
# When triggered from a release-please branch without specifying a version,
# it automatically deploys the RC version (e.g., 1.315.0-rc) from package.json.

name: Internal Promotion

on:
  workflow_dispatch:
    inputs:
      cdn_path:
        description: 'CDN path or version to deploy. Examples: "1.314.0". DO NOT ship a dynamic version like 1.x.x as this can create SRI issues when the version updates later. Leaving as the default will build and ship a new agent matching the version in package.json with an -rc suffix (e.g. 1.315.0-rc) when run from a release-please branch.
        required: false
        type: string
        default: 'https://js-agent.newrelic.com/dev/nr-loader-spa.min.js'

permissions:
  contents: read
  id-token: write

jobs:
  # Resolve the CDN path once for all environments
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      script_url: ${{ steps.resolve-cdn-path.outputs.script_url }}
      version_label: ${{ steps.resolve-cdn-path.outputs.version_label }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Resolve CDN path
        id: resolve-cdn-path
        run: |
          CDN_PATH="${{ inputs.cdn_path }}"
          BRANCH="${{ github.ref_name }}"
          
          # If running on a release-please branch and no explicit cdn_path provided,
          # automatically use the RC version from package.json
          if [[ "$BRANCH" == release-please--* ]] && [[ "$CDN_PATH" == "https://js-agent.newrelic.com/dev/nr-loader-spa.min.js" ]]; then
            echo "🎯 Detected release-please branch: $BRANCH"
            echo "📦 Reading version from package.json to create RC build..."
            
            # Extract version from package.json
            PKG_VERSION=$(jq -r '.version' package.json)
            
            if [[ -z "$PKG_VERSION" || "$PKG_VERSION" == "null" ]]; then
              echo "❌ ERROR: Could not read version from package.json"
              exit 1
            fi
            
            # Create RC version
            RC_VERSION="${PKG_VERSION}-rc"
            echo "🚀 Using Release Candidate version: $RC_VERSION"
            
            SCRIPT_URL="https://js-agent.newrelic.com/nr-loader-spa-${RC_VERSION}.min.js"
            VERSION_LABEL="v${RC_VERSION}"
          elif [[ "$CDN_PATH" =~ ^https?:// ]]; then
            # Full URL provided
            SCRIPT_URL="$CDN_PATH"
            VERSION_LABEL="$CDN_PATH"
          elif [[ "$CDN_PATH" =~ ^[0-9]+\. ]]; then
            # Version number provided (e.g., "1.314.0" or "1.x.x")
            SCRIPT_URL="https://js-agent.newrelic.com/nr-loader-spa-${CDN_PATH}.min.js"
            VERSION_LABEL="v${CDN_PATH}"
          else
            echo "Invalid cdn_path format: $CDN_PATH"
            exit 1
          fi
          
          echo "script_url=$SCRIPT_URL" >> $GITHUB_OUTPUT
          echo "version_label=$VERSION_LABEL" >> $GITHUB_OUTPUT
          echo "Resolved CDN path: $SCRIPT_URL"

  # Step 1: Deploy to Staging
  deploy-staging:
    needs: [resolve-version]
    runs-on: ubuntu-latest
    environment: nr1-staging
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
      
      - name: Promote agent to Staging
        uses: ./.github/actions/internal-promotion
        with:
          nr_environment: staging
          nrba_released_script_url: ${{ needs.resolve-version.outputs.script_url }}
          nrba_app_id: ${{ secrets.INTERNAL_STAGING_APPLICATION_ID }}
          nrba_license_key: ${{ secrets.INTERNAL_LICENSE_KEY }}
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_role: ${{ secrets.AWS_ROLE_ARN }}
          aws_bucket_name: ${{ secrets.AWS_BUCKET }}
          fastly_key: ${{ secrets.FASTLY_PURGE_KEY }}

  # Create change tracking event for staging
  create-staging-change-tracking:
    needs: [resolve-version, deploy-staging]
    environment: change-tracking
    runs-on: Browser-Agent-Assigned-IP-Linux
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Create staging change tracking event (Account 1067061)
        uses: ./.github/actions/change-tracking
        with:
          accountId: '1067061'
          entityGuid: ${{ secrets.NR_ENTITY_GUID_NR1_STAGING }}
          apiKey: ${{ secrets.NR_CHANGE_TRACKING_API_KEY_NR1 }}
          region: 'Staging'
          version: ${{ needs.resolve-version.outputs.version_label }}
          type: 'Basic'
          description: 'Staging promoted to ${{ needs.resolve-version.outputs.version_label }}'
          shortDescription: 'Staging: ${{ needs.resolve-version.outputs.version_label }}'
          deepLink: 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          commit: ${{ github.sha }}
          user: ${{ github.actor }}
          groupId: '${{ github.run_id }}-${{ github.sha }}'

  # Notify staging deployment
  notify-staging:
    needs: [resolve-version, deploy-staging]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Send Slack notification
        uses: ./.github/actions/slack-notification
        with:
          notifications_channel_url: ${{ secrets.SLACK_BROWSER_AGENT_NOTIFICATIONS_WEBHOOK_URL }}
          dem_platform_ops_channel_url: ${{ secrets.SLACK_DEM_PLATFORM_OPS_WEBHOOK_URL }}
          message: ":rocket: New Browser Agent version promoted to \\`staging\\` environment.  See <https://github.com/newrelic/newrelic-browser-agent/actions/runs/${{ github.run_id }}|workflow run>."

  # Step 2: Deploy to Japan Production
  deploy-jp-prod:
    needs: [resolve-version, deploy-staging]
    runs-on: ubuntu-latest
    environment: nr1-jp-prod
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
      
      - name: Promote agent to JP Production
        uses: ./.github/actions/internal-promotion
        with:
          nr_environment: jp-prod
          nrba_released_script_url: ${{ needs.resolve-version.outputs.script_url }}
          nrba_app_id: ${{ secrets.INTERNAL_JP_PRODUCTION_APPLICATION_ID }}
          nrba_license_key: ${{ secrets.INTERNAL_LICENSE_KEY }}
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_role: ${{ secrets.AWS_ROLE_ARN }}
          aws_bucket_name: ${{ secrets.AWS_BUCKET }}
          fastly_key: ${{ secrets.FASTLY_PURGE_KEY }}

  # Create change tracking event for JP production
  create-jp-prod-change-tracking:
    needs: [resolve-version, deploy-jp-prod]
    environment: change-tracking
    runs-on: Browser-Agent-Assigned-IP-Linux
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Create JP production change tracking event (Account 1067061)
        uses: ./.github/actions/change-tracking
        with:
          accountId: '1067061'
          entityGuid: ${{ secrets.NR_ENTITY_GUID_NR1_JP_PROD }}
          apiKey: ${{ secrets.NR_CHANGE_TRACKING_API_KEY_NR1 }}
          region: 'JP'
          version: ${{ needs.resolve-version.outputs.version_label }}
          type: 'Rolling'
          description: 'JP production promoted to ${{ needs.resolve-version.outputs.version_label }}'
          shortDescription: 'JP Prod: ${{ needs.resolve-version.outputs.version_label }}'
          deepLink: 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          commit: ${{ github.sha }}
          user: ${{ github.actor }}
          groupId: '${{ github.run_id }}-${{ github.sha }}'

  # Notify JP production deployment
  notify-jp-prod:
    needs: [resolve-version, deploy-jp-prod]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Send Slack notification
        uses: ./.github/actions/slack-notification
        with:
          notifications_channel_url: ${{ secrets.SLACK_BROWSER_AGENT_NOTIFICATIONS_WEBHOOK_URL }}
          dem_platform_ops_channel_url: ${{ secrets.SLACK_DEM_PLATFORM_OPS_WEBHOOK_URL }}
          message: ":rocket: New Browser Agent version promoted to \\`jp-prod\\` environment.  See <https://github.com/newrelic/newrelic-browser-agent/actions/runs/${{ github.run_id }}|workflow run>."

  # Step 3: Deploy to EU Production
  deploy-eu-prod:
    needs: [resolve-version, deploy-jp-prod]
    runs-on: ubuntu-latest
    environment: nr1-eu-prod
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
      
      - name: Promote agent to EU Production
        uses: ./.github/actions/internal-promotion
        with:
          nr_environment: eu-prod
          nrba_released_script_url: ${{ needs.resolve-version.outputs.script_url }}
          nrba_app_id: ${{ secrets.INTERNAL_EU_PRODUCTION_APPLICATION_ID }}
          nrba_license_key: ${{ secrets.INTERNAL_LICENSE_KEY }}
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_role: ${{ secrets.AWS_ROLE_ARN }}
          aws_bucket_name: ${{ secrets.AWS_BUCKET }}
          fastly_key: ${{ secrets.FASTLY_PURGE_KEY }}

  # Create change tracking event for EU production
  create-eu-prod-change-tracking:
    needs: [resolve-version, deploy-eu-prod]
    environment: change-tracking
    runs-on: Browser-Agent-Assigned-IP-Linux
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Create EU production change tracking event (Account 1067061)
        uses: ./.github/actions/change-tracking
        with:
          accountId: '1067061'
          entityGuid: ${{ secrets.NR_ENTITY_GUID_NR1_EU_PROD }}
          apiKey: ${{ secrets.NR_CHANGE_TRACKING_API_KEY_NR1 }}
          region: 'EU'
          version: ${{ needs.resolve-version.outputs.version_label }}
          type: 'Rolling'
          description: 'EU production promoted to ${{ needs.resolve-version.outputs.version_label }}'
          shortDescription: 'EU Prod: ${{ needs.resolve-version.outputs.version_label }}'
          deepLink: 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          commit: ${{ github.sha }}
          user: ${{ github.actor }}
          groupId: '${{ github.run_id }}-${{ github.sha }}'

  # Notify EU production deployment
  notify-eu-prod:
    needs: [resolve-version, deploy-eu-prod]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Send Slack notification
        uses: ./.github/actions/slack-notification
        with:
          notifications_channel_url: ${{ secrets.SLACK_BROWSER_AGENT_NOTIFICATIONS_WEBHOOK_URL }}
          dem_platform_ops_channel_url: ${{ secrets.SLACK_DEM_PLATFORM_OPS_WEBHOOK_URL }}
          message: ":rocket: New Browser Agent version promoted to \\`eu-prod\\` environment.  See <https://github.com/newrelic/newrelic-browser-agent/actions/runs/${{ github.run_id }}|workflow run>."

  # Step 4: Deploy to US Production
  deploy-us-prod:
    needs: [resolve-version, deploy-eu-prod]
    runs-on: ubuntu-latest
    environment: nr1-us-prod
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
      
      - name: Promote agent to US Production
        uses: ./.github/actions/internal-promotion
        with:
          nr_environment: prod
          nrba_released_script_url: ${{ needs.resolve-version.outputs.script_url }}
          nrba_app_id: ${{ secrets.INTERNAL_PRODUCTION_APPLICATION_ID }}
          nrba_license_key: ${{ secrets.INTERNAL_LICENSE_KEY }}
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_role: ${{ secrets.AWS_ROLE_ARN }}
          aws_bucket_name: ${{ secrets.AWS_BUCKET }}
          fastly_key: ${{ secrets.FASTLY_PURGE_KEY }}

  # Create change tracking event for US production
  create-us-prod-change-tracking:
    needs: [resolve-version, deploy-us-prod]
    environment: change-tracking
    runs-on: Browser-Agent-Assigned-IP-Linux
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Create US production change tracking event (Account 1067061)
        uses: ./.github/actions/change-tracking
        with:
          accountId: '1067061'
          entityGuid: ${{ secrets.NR_ENTITY_GUID_NR1_US_PROD }}
          apiKey: ${{ secrets.NR_CHANGE_TRACKING_API_KEY_NR1 }}
          region: 'US'
          version: ${{ needs.resolve-version.outputs.version_label }}
          type: 'Rolling'
          description: 'US production promoted to ${{ needs.resolve-version.outputs.version_label }}'
          shortDescription: 'US Prod: ${{ needs.resolve-version.outputs.version_label }}'
          deepLink: 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          commit: ${{ github.sha }}
          user: ${{ github.actor }}
          groupId: '${{ github.run_id }}-${{ github.sha }}'

  # Notify US production deployment
  notify-us-prod:
    needs: [resolve-version, deploy-us-prod]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Send Slack notification
        uses: ./.github/actions/slack-notification
        with:
          notifications_channel_url: ${{ secrets.SLACK_BROWSER_AGENT_NOTIFICATIONS_WEBHOOK_URL }}
          dem_platform_ops_channel_url: ${{ secrets.SLACK_DEM_PLATFORM_OPS_WEBHOOK_URL }}
          message: ":rocket: New Browser Agent version promoted to \\`us-prod\\` environment.  See <https://github.com/newrelic/newrelic-browser-agent/actions/runs/${{ github.run_id }}|workflow run>."

  # Re-trigger Release Gate check for Release-Please PRs
  retrigger-release-gate:
    needs: [deploy-us-prod]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      
      - name: Find Release-Please PR for this branch
        id: find-pr
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ github.ref_name }}
        run: |
          # Check if this is a release-please branch
          if [[ ! "$BRANCH" =~ ^release-please-- ]]; then
            echo "Not a release-please branch, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          echo "🔍 Looking for Release-Please PR for branch: $BRANCH"
          
          # Find the PR for this branch
          PR_NUMBER=$(gh pr list \
            --head "$BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number')
          
          if [[ -z "$PR_NUMBER" || "$PR_NUMBER" == "null" ]]; then
            echo "No open PR found for branch $BRANCH"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "✅ Found PR #$PR_NUMBER"
      
      - name: Re-request Release Gate check
        if: steps.find-pr.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.find-pr.outputs.pr_number }}
        run: |
          echo "🔄 Re-requesting checks for PR #$PR_NUMBER to unblock merge"
          
          # Get the latest commit SHA for the PR
          HEAD_SHA=$(gh pr view "$PR_NUMBER" --json headRefOid --jq '.headRefOid')
          
          echo "📌 HEAD SHA: $HEAD_SHA"
          
          # Find the Release Gate check suite for this commit
          CHECK_SUITE_ID=$(gh api \
            "repos/${{ github.repository }}/commits/$HEAD_SHA/check-suites" \
            --jq '.check_suites[] | select(.app.slug == "github-actions" and .conclusion != null) | select(.check_runs[].name == "Verify Internal Promotion") | .id' \
            | head -1)
          
          if [[ -n "$CHECK_SUITE_ID" ]]; then
            echo "🔄 Requesting re-run of check suite $CHECK_SUITE_ID"
            gh api -X POST "repos/${{ github.repository }}/check-suites/$CHECK_SUITE_ID/rerequest"
            echo "✅ Check re-requested successfully"
          else
            echo "⚠️  Could not find Release Gate check suite, it may run automatically"
          fi
          
          echo ""
          echo "🎉 Internal Promotion complete! PR #$PR_NUMBER should now be unblocked."

