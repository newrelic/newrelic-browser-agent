name: Daily Dispatch

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  actions: read

concurrency:
  group: daily-dispatch
  cancel-in-progress: true

jobs:
  notify:
    name: Notify Slack
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Build daily dispatch
        id: dispatch
        uses: ./.github/actions/daily-dispatch
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Slack notification
        uses: ./.github/actions/slack-notification
        with:
          browser_agent_dev_channel_url: ${{ secrets.SLACK_BROWSER_AGENT_DEV_WEBHOOK_URL }}
          payload: ${{ steps.dispatch.outputs.payload }}
