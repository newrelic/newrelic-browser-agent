# This composite action creates New Relic change tracking events for deployments.
# Call this action once per entity/account combination.

name: 'Create Change Tracking Event'
description: 'Creates a New Relic change tracking event for a single entity'

inputs:
  accountId:
    description: 'New Relic account ID (e.g., 1067061, 550352)'
    required: true
  entityGuid:
    description: 'Entity GUID for the application'
    required: true
  apiKey:
    description: 'New Relic User API key for the account'
    required: true
  application:
    description: 'New Relic application name'
    required: true
  version:
    description: 'Version being deployed (required for Deployment category)'
    required: true
  category:
    description: 'Category of event. Valid values: Deployment, Feature Flag'
    required: false
    default: 'Deployment'
  type:
    description: 'Type of deployment event. Valid values: Basic, Rollback, Blue Green, Canary, Rolling, Shadow'
    required: false
    default: 'Basic'
  featureFlagId:
    description: 'ID of the feature flag (required when category is Feature Flag)'
    required: false
    default: ''
  description:
    description: 'Description of the event'
    required: false
    default: ''
  changelog:
    description: 'Changelog for the deployment (URL or text)'
    required: false
    default: ''
  commit:
    description: 'Commit hash for the deployment'
    required: false
    default: ''
  deepLink:
    description: 'Deep link URL for the deployment'
    required: false
    default: ''
  user:
    description: 'Username of the actor or bot'
    required: false
    default: ''
  groupId:
    description: 'String to correlate two or more events'
    required: false
    default: ''
  shortDescription:
    description: 'Short description for the event'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Install dependencies
      run: npm install --silent --no-progress --prefix $GITHUB_ACTION_PATH/..
      shell: bash
    
    - name: Run action script
      id: action-script
      run: |
        node $GITHUB_ACTION_PATH/index.js \
          --entity-guid "${{ inputs.entityGuid }}" \
          --api-key "${{ inputs.apiKey }}" \
          --application "${{ inputs.application }}" \
          --version "${{ inputs.version }}" \
          --category "${{ inputs.category }}" \
          --type "${{ inputs.type }}" \
          ${{ inputs.featureFlagId && format('--feature-flag-id "{0}"', inputs.featureFlagId) || '' }} \
          ${{ inputs.description && format('--description "{0}"', inputs.description) || '' }} \
          ${{ inputs.changelog && format('--changelog "{0}"', inputs.changelog) || '' }} \
          ${{ inputs.commit && format('--commit "{0}"', inputs.commit) || '' }} \
          ${{ inputs.deepLink && format('--deep-link "{0}"', inputs.deepLink) || '' }} \
          ${{ inputs.user && format('--user "{0}"', inputs.user) || '' }} \
          ${{ inputs.groupId && format('--group-id "{0}"', inputs.groupId) || '' }} \
          ${{ inputs.shortDescription && format('--short-description "{0}"', inputs.shortDescription) || '' }}
      shell: bash
