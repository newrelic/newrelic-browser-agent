<!doctype html>
<html>
  <head>
    <title>Simple XHR</title>
    {init} {config}
    <script>
      NREUM.init.feature_flags = ["register", "register.generic_events"];
    </script>
    {loader}
  </head>
  <body>
    <div data-nr-mfe-id="5678"><div>This page uses a button to initiate an XHR.</div></div>
    <div>
      <div data-nr-mfe-id="5678">
        <div>
          <button id="sendAjax"><span>Send Ajax</span></button>
        </div>
      </div>
    </div>
    <script>
      let i = 0;
      document.getElementById("sendAjax").addEventListener("click", function () {
        var xhr = new XMLHttpRequest();
        xhr.addEventListener("loadend", function () {
          window.location.hash = Math.random();

          const elem = document.createElement("div");
          elem.innerHTML = "TEST" + i++;
          document.body.appendChild(elem);
        });
        xhr.open("GET", "/json");
        xhr.send();
      });
    </script>
  </body>
</html>
